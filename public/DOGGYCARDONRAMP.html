<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>$DOGGY Onramp</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(ellipse at 50% 40%, #1a0a2e 0%, #0d0618 100%);
      font-family: 'Courier New', monospace;
    }

    .container {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .glass {
      position: relative;
      width: 180px;
      height: 210px;
      border: 1px solid rgba(255, 255, 255, 0.13);
      box-shadow: 0 25px 25px rgba(0, 0, 0, 0.4);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 12px;
      transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      border-radius: 16px;
      margin: 0 -45px;
      backdrop-filter: blur(12px);
      cursor: pointer;
      overflow: hidden;
    }

    /* Labels de fondo */
    .glass::before {
      content: attr(data-text);
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 42px;
      background: rgba(255,255,255,0.06);
      border-top: 1px solid rgba(255,255,255,0.08);
      border-radius: 0 0 16px 16px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      font-size: 0.7em;
      font-weight: 700;
      letter-spacing: 0.14em;
    }

    /* FIAT */
    .glass--fiat {
    height: 230px;
      background: linear-gradient(135deg, rgba(0,180,120,0.2) 0%, rgba(0,100,80,0.1) 100%);
      border-color: rgba(0, 220, 150, 0.3);
      transform: rotate(-15deg);
    }

    /* ONRAMP */
    .glass--onramp {
      background: linear-gradient(135deg, rgba(255,140,0,0.18) 0%, rgba(200,80,0,0.08) 100%);
      border-color: rgba(255, 160, 50, 0.3);
      transform: rotate(5deg);
      z-index: 2;
    }

    /* DOGGY */
    .glass--doggy {
      background: linear-gradient(135deg, rgba(255,210,0,0.22) 0%, rgba(180,120,0,0.1) 100%);
      border-color: rgba(255, 210, 0, 0.35);
      transform: rotate(25deg);
    }

    /* Hover: desplegar */
    .container:hover .glass {
      transform: rotate(0deg);
      margin: 0 10px;
    }
    .container:hover .glass--fiat {
    height: 230px;
      box-shadow: 0 0 30px rgba(0,220,150,0.4), 0 25px 25px rgba(0,0,0,0.4);
    }
    .container:hover .glass--onramp {
      box-shadow: 0 0 30px rgba(255,140,0,0.4), 0 25px 25px rgba(0,0,0,0.4);
    }
    .container:hover .glass--doggy {
      box-shadow: 0 0 40px rgba(255,210,0,0.55), 0 25px 25px rgba(0,0,0,0.4);
    }
    .container:hover .glass--doggy svg {
      animation: floatPulse 1.8s ease-in-out infinite;
    }

    /* Íconos */
    .icon-wrap svg {
      width: 2.6em;
      height: 2.6em;
      fill: #fff;
      filter: drop-shadow(0 0 8px rgba(255,255,255,0.4));
      transition: transform 0.3s ease;
    }

    /* Badge */
    .badge {
      font-size: 0.62em;
      font-weight: 800;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.7);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      padding: 2px 10px;
    }
    .badge--gold {
      color: #ffd700;
      background: rgba(255,215,0,0.12);
      border-color: rgba(255,215,0,0.4);
      animation: shimmer 2.5s linear infinite;
      background: linear-gradient(90deg, rgba(255,210,0,0.1), rgba(255,200,0,0.3), rgba(255,210,0,0.1));
      background-size: 200% auto;
    }

    /* Puntos ONRAMP */
    .dots {
      display: flex;
      gap: 5px;
      align-items: center;
    }
    .dot {
      display: block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,140,0,0.8);
      animation: pulseDot 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes floatPulse {
      0%, 100% { transform: translateY(0) scale(1); }
      50%       { transform: translateY(-6px) scale(1.08); }
    }
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position:  200% center; }
    }
    @keyframes pulseDot {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50%       { opacity: 1;   transform: scale(1.2); }
    }
  </style>
</head>
