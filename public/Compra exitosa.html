<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DOGGY OnRamp — Modal Compra Exitosa</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #080a10;
      font-family: 'Sora', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* OVERLAY */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(8, 10, 16, 0.88);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      animation: fadeOverlay 0.4s ease forwards;
    }

    @keyframes fadeOverlay {
      to { opacity: 1; }
    }

    /* CANVAS CONFETTI */
    #confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 99;
    }

    /* MODAL CARD */
    .modal {
      background: #131620;
      border: 1px solid rgba(245, 158, 11, 0.18);
      border-radius: 24px;
      padding: 40px 32px 32px;
      width: 340px;
      max-width: 92vw;
      text-align: center;
      position: relative;
      z-index: 101;
      transform: scale(0.7) translateY(40px);
      opacity: 0;
      animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.15s forwards;
      box-shadow:
        0 0 0 1px rgba(245,158,11,0.08),
        0 24px 60px rgba(0,0,0,0.6),
        0 0 80px rgba(245,158,11,0.06);
    }

    @keyframes popIn {
      to { transform: scale(1) translateY(0); opacity: 1; }
    }

    /* PAW ICON */
    .paw-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      opacity: 0;
      animation: pawBounce 0.6s cubic-bezier(0.34, 1.7, 0.64, 1) 0.5s forwards;
    }

    @keyframes pawBounce {
      0%   { transform: scale(0) rotate(-15deg); opacity: 0; }
      60%  { transform: scale(1.25) rotate(5deg); opacity: 1; }
      80%  { transform: scale(0.92) rotate(-2deg); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    .paw-icon {
      font-size: 64px;
      line-height: 1;
      filter: drop-shadow(0 0 18px rgba(240,192,48,0.6)) drop-shadow(0 0 40px rgba(240,192,48,0.3));
      animation: pawFloat 3s ease-in-out 1.2s infinite;
    }

    @keyframes pawFloat {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-6px); }
    }

    /* HEADLINE */
    .headline {
      font-size: 22px;
      font-weight: 800;
      color: #f0c030;
      margin-bottom: 10px;
      opacity: 0;
      display: inline-block;
      animation: slideUp 0.4s ease 0.7s forwards, goldPulse 2.5s ease-in-out 1.4s infinite;
    }

    /* SUBTEXT */
    .subtext {
      font-size: 14px;
      font-weight: 600;
      color: rgba(255,255,255,0.75);
      line-height: 1.5;
      margin-bottom: 6px;
      opacity: 0;
      animation: slideUp 0.4s ease 0.8s forwards;
    }

    .subtext-muted {
      font-size: 12px;
      font-weight: 400;
      color: rgba(255,255,255,0.38);
      margin-bottom: 24px;
      opacity: 0;
      animation: slideUp 0.4s ease 0.9s forwards;
    }

    @keyframes slideUp {
      from { transform: translateY(12px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }

    /* AMOUNT */
    .amount-wrap {
      margin-bottom: 28px;
      opacity: 0;
      animation: slideUp 0.4s ease 1s forwards;
    }

    .amount {
      font-size: 36px;
      font-weight: 800;
      color: #f0c030;
      letter-spacing: -0.5px;
      animation: goldPulse 2.5s ease-in-out 1.6s infinite;
      display: inline-block;
    }

    @keyframes goldPulse {
      0%, 100% { text-shadow: 0 0 12px rgba(245,158,11,0.5), 0 0 32px rgba(245,158,11,0.2); }
      50%       { text-shadow: 0 0 24px rgba(245,158,11,0.9), 0 0 60px rgba(245,158,11,0.4); }
    }

    /* CTA BUTTON */
    .btn-primary {
      display: block;
      width: 100%;
      padding: 14px 0;
      background: #f59e0b;
      color: #080a10;
      font-family: 'Sora', sans-serif;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      margin-bottom: 14px;
      opacity: 0;
      animation: slideUp 0.4s ease 1.1s forwards;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    }

    .btn-primary:hover {
      background: #fbbf24;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(245,158,11,0.35);
    }

    .btn-primary:active {
      transform: translateY(0px) scale(0.98);
    }

    /* CERRAR */
    .btn-close {
      background: none;
      border: none;
      color: rgba(255,255,255,0.3);
      font-family: 'Sora', sans-serif;
      font-size: 13px;
      cursor: pointer;
      padding: 4px 12px;
      opacity: 0;
      animation: slideUp 0.4s ease 1.2s forwards;
      transition: color 0.2s;
    }

    .btn-close:hover {
      color: rgba(255,255,255,0.6);
    }

    /* SEPARATOR LINE */
    .divider {
      width: 40px;
      height: 2px;
      background: rgba(245,158,11,0.25);
      border-radius: 2px;
      margin: 0 auto 20px;
      opacity: 0;
      animation: slideUp 0.4s ease 0.95s forwards;
    }
  </style>
</head>
<body>

  <canvas id="confetti-canvas"></canvas>

  <div class="overlay" id="overlay">
    <div class="modal" id="modal">
      <p class="headline">¡Compra Exitosa!</p>
      <p class="subtext">Pronto verás los DOGGYs reflejados<br>en tu panel de Wallet</p>
      <p class="subtext-muted">Estamos enviando tus DOGGYs… aguanta tantito</p>

      <div class="divider"></div>

      <div class="amount-wrap">
        <span class="amount" id="amount-display">+0 DOGGY</span>
      </div>

      <button class="btn-primary">Ver mi Wallet →</button>
      <button class="btn-close" onclick="document.getElementById('overlay').style.display='none'">Cerrar</button>
    </div>
  </div>

  <script>
    /* COUNT-UP ANIMATION */
    const target = 1240;
    const el = document.getElementById('amount-display');
    const duration = 1400;
    const startDelay = 1100;
    let startTime = null;

    function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

    function countUp(ts) {
      if (!startTime) startTime = ts;
      const elapsed = ts - startTime;
      const progress = Math.min(elapsed / duration, 1);
      const value = Math.floor(easeOut(progress) * target);
      el.textContent = '+' + value.toLocaleString('es-MX') + ' DOGGY';
      if (progress < 1) requestAnimationFrame(countUp);
    }

    setTimeout(() => requestAnimationFrame(countUp), startDelay);

    /* CONFETTI */
    const canvas = document.getElementById('confetti-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const particles = [];
    const colors = ['#f59e0b', '#fbbf24', '#ffffff', '#fde68a', '#d97706'];
    const shapes = ['circle', 'rect'];

    for (let i = 0; i < 90; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: -20 - Math.random() * 200,
        size: 4 + Math.random() * 8,
        color: colors[Math.floor(Math.random() * colors.length)],
        shape: shapes[Math.floor(Math.random() * shapes.length)],
        vx: (Math.random() - 0.5) * 3,
        vy: 1.5 + Math.random() * 3,
        rotation: Math.random() * 360,
        rotSpeed: (Math.random() - 0.5) * 6,
        opacity: 0.8 + Math.random() * 0.2,
        life: 1
      });
    }

    let confettiActive = true;

    function drawConfetti() {
      if (!confettiActive) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      let allDead = true;

      particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.rotation += p.rotSpeed;
        p.vy += 0.04;

        if (p.y < canvas.height + 20) allDead = false;

        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rotation * Math.PI / 180);
        ctx.globalAlpha = p.opacity * Math.min(1, (canvas.height - p.y + 60) / 100);
        ctx.fillStyle = p.color;

        if (p.shape === 'circle') {
          ctx.beginPath();
          ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
          ctx.fill();
        } else if (p.shape === 'rect') {
          ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
        } else {
          ctx.font = (p.size * 2) + 'px serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('🐾', 0, 0);
        }
        ctx.restore();
      });

      if (allDead) { confettiActive = false; ctx.clearRect(0,0,canvas.width,canvas.height); return; }
      requestAnimationFrame(drawConfetti);
    }

    setTimeout(() => requestAnimationFrame(drawConfetti), 300);

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>

</body>
</html>
